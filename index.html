<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"> <!-- ✅ Added: prevents character encoding issues -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- ✅ Added: proper scaling -->
 <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>✦ Heart</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      overflow: hidden;
      font-family: 'Georgia', serif;
    }

    #canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      display: block;
    }

    #video {
      position: fixed;
      bottom: 16px; right: 16px;
      width: 180px;
      height: 130px;
      border-radius: 12px;
      border: 1px solid rgba(255,80,120,0.3);
      object-fit: cover;
      transform: scaleX(-1);
      opacity: 0.85;
      z-index: 10;
    }

    #status {
      position: fixed;
      bottom: 16px; left: 16px;
      color: rgba(255,255,255,0.5);
      font-size: 12px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      z-index: 10;
      line-height: 1.8;
    }

    #gesture-label {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 11px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: rgba(255,80,120,0.0);
      z-index: 5;
      transition: color 0.4s ease;
      pointer-events: none;
    }

    #hint {
      position: fixed;
      top: 24px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.35);
      font-size: 12px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      z-index: 10;
      text-align: center;
      line-height: 2;
    }

    .loading-overlay {
      position: fixed;
      inset: 0;
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      gap: 16px;
      transition: opacity 0.8s ease;
    }

    .loading-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .loader-heart {
      font-size: 32px;
      animation: pulse 1s ease-in-out infinite;
    }

    .loader-text {
      color: rgba(255,255,255,0.4);
      font-size: 11px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 0.6; }
      50% { transform: scale(1.2); opacity: 1; }
    }
  </style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
  <div class="loader-heart">♥</div>
  <div class="loader-text" id="loadingText">Loading camera...</div>
</div>

<canvas id="canvas"></canvas>
<video id="video" autoplay playsinline muted></video>

<div id="hint">
  ✦ open hand → heart &nbsp;|&nbsp; pinch → resize &nbsp;|&nbsp; fist → explode
</div>

<div id="status">
  <div id="statusGesture">gesture: —</div>
  <div id="statusFingers">fingers: —</div>
</div>

<div id="gesture-label" id="gestureLabel"></div>

<!-- MediaPipe Hands -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

<script>
// ─── Canvas Setup ──────────────────────────────────────────────
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
window.addEventListener('resize', () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  if (heartCreated) createHeart();
});

// ─── State ─────────────────────────────────────────────────────
let scale = 1;
let targetScale = 1;
let showHeart = false;
let particles = [];
let heartCreated = false;
let exploded = false;
let currentGesture = 'none';
let heartAlpha = 0;
let glowIntensity = 0;

// ─── Heart Math ────────────────────────────────────────────────
function heartShape(t) {
  return {
    x: 16 * Math.pow(Math.sin(t), 3),
    y: -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t))
  };
}

function createHeart() {
  particles = [];
  const count = 1200;
  for (let i = 0; i < count; i++) {
    const t = Math.random() * Math.PI * 2;
    const pos = heartShape(t);
    const jitter = Math.random() * 3 - 1.5;
    particles.push({
      x: canvas.width / 2 + pos.x * 14 + jitter,
      y: canvas.height / 2 + pos.y * 14 + jitter,
      ox: canvas.width / 2 + pos.x * 14,
      oy: canvas.height / 2 + pos.y * 14,
      vx: 0,
      vy: 0,
      life: 1,
      size: Math.random() * 1.5 + 1,
      hue: Math.random() * 30 - 15 // slight color variation
    });
  }
  heartCreated = true;
}

function explodeHeart() {
  particles.forEach(p => {
    const angle = Math.atan2(p.y - canvas.height/2, p.x - canvas.width/2);
    const speed = Math.random() * 12 + 4;
    p.vx = Math.cos(angle) * speed * (Math.random() * 0.8 + 0.5);
    p.vy = Math.sin(angle) * speed * (Math.random() * 0.8 + 0.5) - Math.random() * 4;
    p.life = 1;
  });
}

// ─── Gesture Detection ─────────────────────────────────────────
function countFingers(landmarks) {
  const fingers = [];
  // Thumb: compare tip x to joint x (mirrored)
  fingers.push(landmarks[4].x < landmarks[3].x ? 1 : 0);
  // Other fingers: tip y < pip y = extended
  const tips = [8, 12, 16, 20];
  const pips = [6, 10, 14, 18];
  for (let i = 0; i < 4; i++) {
    fingers.push(landmarks[tips[i]].y < landmarks[pips[i]].y ? 1 : 0);
  }
  return fingers;
}

function getPinchDistance(landmarks) {
  const thumb = landmarks[4];
  const index = landmarks[8];
  const dx = thumb.x - index.x;
  const dy = thumb.y - index.y;
  return Math.sqrt(dx*dx + dy*dy);
}

// ─── MediaPipe Hands Setup ─────────────────────────────────────
const videoEl = document.getElementById('video');

const hands = new Hands({
  locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
});

hands.setOptions({
  maxNumHands: 1,
  modelComplexity: 1,
  minDetectionConfidence: 0.6,
  minTrackingConfidence: 0.5
});

hands.onResults(onHandResults);

function onHandResults(results) {
  if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
    const landmarks = results.multiHandLandmarks[0];
    const fingers = countFingers(landmarks);
    const total = fingers.reduce((a, b) => a + b, 0);

    document.getElementById('statusFingers').textContent = `fingers: ${total}`;

    if (total >= 4) {
      // Open hand → show heart
      currentGesture = 'open';
      showHeart = true;
      exploded = false;
      if (!heartCreated) createHeart();
      targetScale = 1;

    } else if (total === 0) {
      // Fist → explode
      currentGesture = 'fist';
      if (!exploded && heartCreated) {
        explodeHeart();
        exploded = true;
      }
      setTimeout(() => {
        showHeart = false;
        heartCreated = false;
      }, 1200);

    } else if (fingers[1] === 1 && fingers[2] === 0) {
      // Index only → pinch scale
      currentGesture = 'pinch';
      const dist = getPinchDistance(landmarks);
      targetScale = Math.min(Math.max(dist / 0.18, 0.4), 2.5);

    } else {
      currentGesture = 'other';
    }

    document.getElementById('statusGesture').textContent = `gesture: ${currentGesture}`;

  } else {
    currentGesture = 'none';
    document.getElementById('statusGesture').textContent = `gesture: none`;
    document.getElementById('statusFingers').textContent = `fingers: —`;
  }
}

// Start camera
async function startCamera() {
  try {
    document.getElementById('loadingText').textContent = 'Requesting camera...';
    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
    videoEl.srcObject = stream;

    videoEl.onloadedmetadata = () => {
      document.getElementById('loadingText').textContent = 'Loading hand model...';

      const camera = new Camera(videoEl, {
        onFrame: async () => {
          await hands.send({ image: videoEl });
        },
        width: 640,
        height: 480
      });

      camera.start().then(() => {
        setTimeout(() => {
          document.getElementById('loadingOverlay').classList.add('hidden');
        }, 800);
      });
    };

  } catch (err) {
    document.getElementById('loadingText').textContent = 'Camera access denied :(';
    console.error(err);
  }
}

startCamera();

// ─── Render Loop ───────────────────────────────────────────────
let frameCount = 0;

function animate() {
  frameCount++;

  // Smooth scale interpolation
  scale += (targetScale - scale) * 0.08;

  // Fade heart in/out
  if (showHeart && heartCreated && !exploded) {
    heartAlpha = Math.min(heartAlpha + 0.04, 1);
    glowIntensity = Math.min(glowIntensity + 0.05, 1);
  } else if (exploded) {
    heartAlpha = Math.max(heartAlpha - 0.015, 0);
    glowIntensity = Math.max(glowIntensity - 0.02, 0);
  }

  // Trail effect
  ctx.fillStyle = 'rgba(0, 0, 0, 0.18)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  if (heartCreated && particles.length > 0) {
    particles.forEach(p => {
      // Physics
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.15; // gravity when exploding
      p.vx *= 0.96;
      p.vy *= 0.96;

      // Pulse when not exploded
      if (!exploded && showHeart) {
        const pulse = 1 + Math.sin(frameCount * 0.04) * 0.015;
        const dx = p.ox - canvas.width / 2;
        const dy = p.oy - canvas.height / 2;
        p.x += (p.ox * scale * pulse - canvas.width/2*(scale*pulse-1) - p.x) * 0.06;
        p.y += (p.oy * scale * pulse - canvas.height/2*(scale*pulse-1) - p.y) * 0.06;
      }

      // Color based on position (top = lighter pink, bottom = deeper red)
      const normY = (p.y - canvas.height/2) / (canvas.height * 0.2);
      const r = Math.min(255, 220 + normY * 30 + p.hue * 2);
      const g = Math.max(0, 40 + normY * 10);
      const b = Math.max(0, 60 + normY * 5);
      const alpha = heartAlpha * (exploded ? Math.max(0, 1 - frameCount * 0.001) : 1);

      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size * (exploded ? 1.5 : 1), 0, Math.PI * 2);

      // Glow effect
      if (!exploded && glowIntensity > 0.5) {
        const grd = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.size * 4);
        grd.addColorStop(0, `rgba(${r},${g},${b},${alpha})`);
        grd.addColorStop(1, `rgba(${r},${g},${b},0)`);
        ctx.fillStyle = grd;
        ctx.arc(p.x, p.y, p.size * 4, 0, Math.PI * 2);
      } else {
        ctx.fillStyle = `rgba(${r},${g},${b},${alpha})`;
      }

      ctx.fill();
    });
  }

  // Draw subtle center glow when heart is present
  if (showHeart && !exploded && heartAlpha > 0.3) {
    const pulse = 1 + Math.sin(frameCount * 0.04) * 0.3;
    const grd = ctx.createRadialGradient(
      canvas.width/2, canvas.height/2, 0,
      canvas.width/2, canvas.height/2, 120 * scale * pulse
    );
    grd.addColorStop(0, `rgba(255, 60, 100, ${0.06 * heartAlpha})`);
    grd.addColorStop(1, 'rgba(255, 60, 100, 0)');
    ctx.fillStyle = grd;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
  }

  requestAnimationFrame(animate);
}

animate();
</script>
</body>
</html> <title>Gesture Heart</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<canvas id="canvas"></canvas>

<script src="script.js"></script>
</body>
</html>
